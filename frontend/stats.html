<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Helios Analytics</title>
  <link rel="icon" type="image/png" href="/static/helios-icon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-blur bg-blur--left"  aria-hidden="true"></div>
  <div class="bg-blur bg-blur--right" aria-hidden="true"></div>

  <main class="stats-main">
    <header class="stats-header">
      <h1>Helios Analytics</h1>
    </header>

    <section class="stats-kpis">
      <div class="kpi-card">
        <div class="kpi-value" data-kpi="total_visits_24h">,</div>
        <div class="kpi-label">visits, last 24 h</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value" data-kpi="unique_visitors_24h">,</div>
        <div class="kpi-label">unique IPs, last 24 h</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value" data-kpi="conversions_24h">,</div>
        <div class="kpi-label">conversions, last 24 h</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value" data-kpi="downloads_24h">,</div>
        <div class="kpi-label">card downloads, last 24 h</div>
      </div>
    </section>

    <!--  Three histograms with shared 24h / 7d / 30d range tabs. -->
    <section class="card stats-histogram" data-hist="visits">
      <header class="histogram-header">
        <h2>Visits over time</h2>
        <div class="histogram-tabs" role="tablist" aria-label="Time range">
          <button type="button" class="hist-tab is-active" data-range="24h" role="tab" aria-selected="true">24 h</button>
          <button type="button" class="hist-tab"           data-range="7d"  role="tab" aria-selected="false">7 days</button>
          <button type="button" class="hist-tab"           data-range="30d" role="tab" aria-selected="false">30 days</button>
        </div>
      </header>
      <div class="chart-wrap chart-wrap--wide">
        <canvas id="chart-histogram-visits"></canvas>
      </div>
    </section>

    <section class="card stats-histogram" data-hist="conversions">
      <header class="histogram-header">
        <h2>LiDAR conversions over time</h2>
        <div class="histogram-tabs" role="tablist" aria-label="Time range">
          <button type="button" class="hist-tab is-active" data-range="24h" role="tab" aria-selected="true">24 h</button>
          <button type="button" class="hist-tab"           data-range="7d"  role="tab" aria-selected="false">7 days</button>
          <button type="button" class="hist-tab"           data-range="30d" role="tab" aria-selected="false">30 days</button>
        </div>
      </header>
      <div class="chart-wrap chart-wrap--wide">
        <canvas id="chart-histogram-conversions"></canvas>
      </div>
    </section>

    <section class="card stats-histogram" data-hist="downloads">
      <header class="histogram-header">
        <h2>Card downloads over time</h2>
        <div class="histogram-tabs" role="tablist" aria-label="Time range">
          <button type="button" class="hist-tab is-active" data-range="24h" role="tab" aria-selected="true">24 h</button>
          <button type="button" class="hist-tab"           data-range="7d"  role="tab" aria-selected="false">7 days</button>
          <button type="button" class="hist-tab"           data-range="30d" role="tab" aria-selected="false">30 days</button>
        </div>
      </header>
      <div class="chart-wrap chart-wrap--wide">
        <canvas id="chart-histogram-downloads"></canvas>
      </div>
    </section>

    <section class="stats-grid">
      <div class="card chart-card">
        <h3>Country</h3>
        <div class="chart-wrap">
          <canvas id="chart-countries"></canvas>
        </div>
      </div>
      <div class="card chart-card">
        <h3>Browser</h3>
        <div class="chart-wrap">
          <canvas id="chart-browsers"></canvas>
        </div>
      </div>
      <div class="card chart-card">
        <h3>Operating system</h3>
        <div class="chart-wrap">
          <canvas id="chart-os"></canvas>
        </div>
      </div>
      <div class="card chart-card">
        <h3>Device</h3>
        <div class="chart-wrap">
          <canvas id="chart-devices"></canvas>
        </div>
      </div>
      <div class="card chart-card stats-grid-wide">
        <h3>Top external referrers</h3>
        <div class="chart-wrap">
          <canvas id="chart-referrers"></canvas>
        </div>
      </div>
    </section>

    <footer class="stats-footer">
      <a href="/">&larr; Back to Helios-Lidar</a>
      <span class="stats-refresh">Last refresh: <span id="stats-fetched-at">,</span></span>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script type="module" src="/static/stats.js"></script>
  <!--  Background lattice + breathing animation, same module the
        main page uses. Sits behind the foreground content thanks
        to its own .bg-pointcloud { z-index: -2 } in style.css.  -->
  <script type="module" src="/static/bg-pointcloud.js"></script>
</body>
</html>
